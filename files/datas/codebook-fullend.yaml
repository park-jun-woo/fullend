# filefunc codebook for fullend
# 어노테이션 예: //fullend:func feature=crosscheck type=rule source=SSaC target=OpenAPI

# 기능 영역
feature:
  - crosscheck    # SSOT 간 교차 검증
  - validate      # SSOT 단건 검증
  - gen           # 코드 산출물 생성
  - parse         # SSOT 파싱
  - report        # 검증 결과 포매팅
  - contract      # 생성 코드 소유권 추적
  - orchestrate   # CLI 명령 실행 순서 제어

# 함수/코드 유형
type:
  - rule          # Check*(inputs) → []CrossError
  - parser        # Parse(path) → T
  - validator     # Validate(T) → []Error
  - generator     # Generate(T, outDir) → error
  - handler       # HTTP 핸들러
  - middleware     # HTTP 미들웨어
  - loader        # Load(path) → T
  - detector      # Detect(root) → []Found
  - model         # struct 정의 (DTO, 도메인 모델)
  - funcspec      # @func + Request/Response
  - util          # 내부 헬퍼

# SSOT 종류 (source/target에 사용)
ssot:
  - OpenAPI
  - DDL
  - SSaC
  - STML
  - States
  - Policy
  - Config
  - Scenario
  - Func
  - Model

# 설계 패턴
pattern:
  - rulebook          # Named rule 등록 + 루프 실행
  - target-interface  # 다중 플랫폼 코드젠 (Go, Java, TS)
  - symbol-table      # DDL 파싱 결과 메모리 캐시
  - error-collection  # 에러 수집 후 배치 반환
  - directive         # 생성 코드 소유권 추적 (gen/preserve)
  - middleware-chain   # HTTP 미들웨어 연쇄
  - template          # 문자열 템플릿 → 소스 코드
  - domain-grouping   # 도메인별 폴더 조직

# 계층
layer:
  - cmd             # CLI 엔트리포인트
  - orchestrator    # 실행 순서 제어
  - domain          # 파싱 + 검증 (ssac, stml, policy, statemachine, funcspec)
  - crosscheck      # SSOT 간 교차 검증
  - gen             # 코드 생성 (gluegen → gen/gogin, gen/react, gen/hurl)
  - reporter        # 출력 포매팅
  - pkg             # 런타임 라이브러리

# 검증 수준
level:
  - ERROR           # SSOT 불일치, codegen 불가
  - WARNING         # 모범 사례 위반, codegen 가능
  - INFO            # 정보성 (미사용 테이블 등)
