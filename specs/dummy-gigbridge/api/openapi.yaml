openapi: 3.0.3
info:
  title: GigBridge API
  version: 1.0.0
  description: Freelance Escrow Matching Platform

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        Email:
          type: string
        PasswordHash:
          type: string
        Role:
          type: string
        Name:
          type: string
        CreatedAt:
          type: string
          format: date-time

    Gig:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        ClientID:
          type: integer
          format: int64
        Title:
          type: string
        Description:
          type: string
        Budget:
          type: integer
        Status:
          type: string
        FreelancerID:
          type: integer
          format: int64
        CreatedAt:
          type: string
          format: date-time

    Proposal:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        GigID:
          type: integer
          format: int64
        FreelancerID:
          type: integer
          format: int64
        BidAmount:
          type: integer
        Status:
          type: string
        CreatedAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        GigID:
          type: integer
          format: int64
        Type:
          type: string
        Amount:
          type: integer
        CreatedAt:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Email, Password, Role, Name]
              properties:
                Email:
                  type: string
                Password:
                  type: string
                Role:
                  type: string
                Name:
                  type: string
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"

  /auth/login:
    post:
      operationId: Login
      summary: Login and get access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Email, Password]
              properties:
                Email:
                  type: string
                Password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string

  /gigs:
    get:
      operationId: ListGigs
      summary: List all gigs
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [budget, created_at]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status, budget]
      x-include:
        allowed: [client_id:users.id]
      responses:
        "200":
          description: Gigs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  gigs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Gig"
                  total:
                    type: integer

    post:
      operationId: CreateGig
      summary: Create a new gig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Title, Description, Budget]
              properties:
                Title:
                  type: string
                Description:
                  type: string
                Budget:
                  type: integer
      responses:
        "200":
          description: Gig created
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"

  /gigs/{ID}:
    get:
      operationId: GetGig
      summary: Get a single gig
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"

  /gigs/{ID}/publish:
    put:
      operationId: PublishGig
      summary: Publish a gig
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"

  /gigs/{GigID}/proposals:
    post:
      operationId: SubmitProposal
      summary: Submit a proposal for a gig
      security:
        - bearerAuth: []
      parameters:
        - name: GigID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [BidAmount]
              properties:
                BidAmount:
                  type: integer
      responses:
        "200":
          description: Proposal submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: "#/components/schemas/Proposal"

  /proposals/{ID}/accept:
    post:
      operationId: AcceptProposal
      summary: Accept a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
                  transactionID:
                    type: integer
                    format: int64

  /proposals/{ID}/reject:
    post:
      operationId: RejectProposal
      summary: Reject a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: "#/components/schemas/Proposal"

  /gigs/{ID}/submit-work:
    post:
      operationId: SubmitWork
      summary: Submit work for a gig
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"

  /gigs/{ID}/approve:
    post:
      operationId: ApproveWork
      summary: Approve submitted work
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
                  transactionID:
                    type: integer
                    format: int64

  /gigs/{ID}/dispute:
    post:
      operationId: RaiseDispute
      summary: Raise a dispute on a gig
      security:
        - bearerAuth: []
      parameters:
        - name: ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Dispute raised
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
