<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gigs</title>
</head>
<body>
    <div data-fetch="ListGigs" data-paginate data-sort="created_at:desc" data-filter="status">
        <div data-each="items">
            <h2 data-bind="title"></h2>
            <p data-bind="description"></p>
            <span data-bind="budget"></span>
            <span data-bind="status"></span>
        </div>
    </div>
</body>
</html>
