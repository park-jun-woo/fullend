openapi: 3.0.3
info:
  title: GigBridge API
  version: 1.0.0
servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
        name:
          type: string
    Gig:
      type: object
      properties:
        id:
          type: integer
          format: int64
        client_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        budget:
          type: integer
        status:
          type: string
        freelancer_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Proposal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        freelancer_id:
          type: integer
          format: int64
        bid_amount:
          type: integer
        status:
          type: string
    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        tx_type:
          type: string
        amount:
          type: integer
        created_at:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, name]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  maxLength: 50
                name:
                  type: string
                  maxLength: 255
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          description: Email already exists

  /auth/login:
    post:
      operationId: Login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        '401':
          description: Invalid credentials

  /gigs:
    post:
      operationId: CreateGig
      summary: Create a new gig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, budget]
              properties:
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                budget:
                  type: integer
      responses:
        '201':
          description: Gig created
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
    get:
      operationId: ListGigs
      summary: List gigs
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at, budget]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortDir
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of gigs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Gig'
                  total:
                    type: integer

  /gigs/{id}:
    get:
      operationId: GetGig
      summary: Get a single gig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gig detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '404':
          description: Gig not found

  /gigs/{id}/publish:
    put:
      operationId: PublishGig
      summary: Publish a gig
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gig published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
        '404':
          description: Gig not found
        '409':
          description: Invalid state transition

  /gigs/{id}/proposals:
    post:
      operationId: SubmitProposal
      summary: Submit a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bid_amount]
              properties:
                bid_amount:
                  type: integer
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: '#/components/schemas/Proposal'
        '403':
          description: Forbidden

  /proposals/{id}/accept:
    post:
      operationId: AcceptProposal
      summary: Accept a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Proposal accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: '#/components/schemas/Proposal'
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
        '404':
          description: Proposal not found
        '409':
          description: Invalid state transition
        '500':
          description: Internal server error

  /gigs/{id}/submit-work:
    post:
      operationId: SubmitWork
      summary: Submit work for review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
        '404':
          description: Gig not found
        '409':
          description: Invalid state transition

  /gigs/{id}/approve:
    post:
      operationId: ApproveWork
      summary: Approve completed work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Work approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
        '404':
          description: Gig not found
        '409':
          description: Invalid state transition
        '500':
          description: Internal server error
