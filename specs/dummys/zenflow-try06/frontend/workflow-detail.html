<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workflow Detail</title>
</head>
<body>
    <section data-fetch="GetWorkflow" data-param-id="route.id">
        <h2 data-bind="workflow.title"></h2>
        <span data-bind="workflow.status"></span>
        <span data-bind="workflow.trigger_event"></span>
        <span data-bind="workflow.version"></span>

        <button data-action="ActivateWorkflow" data-param-id="route.id" data-state="workflow.status == 'draft'">Activate</button>
        <button data-action="ActivateWorkflow" data-param-id="route.id" data-state="workflow.status == 'paused'">Resume</button>
        <button data-action="PauseWorkflow" data-param-id="route.id" data-state="workflow.status == 'active'">Pause</button>
        <button data-action="ArchiveWorkflow" data-param-id="route.id" data-state="workflow.status == 'active'">Archive</button>
        <button data-action="ExecuteWorkflow" data-param-id="route.id" data-state="workflow.status == 'active'">Execute</button>
        <button data-action="CreateWorkflowVersion" data-param-id="route.id">New Version</button>
    </section>
</body>
</html>
