apiVersion: fullend/v1
kind: Project
metadata:
  name: zenflow
backend:
  lang: go
  framework: gin
  module: github.com/example/zenflow
  middleware:
    - bearerAuth
  auth:
    type: jwt
    secret_env: JWT_SECRET
    claims:
      ID: user_id:int64
      Email: email
      Role: role
      OrgID: org_id:int64
session:
  backend: postgres
queue:
  backend: postgres
file:
  backend: local
frontend:
  lang: typescript
  framework: react
  bundler: vite
  name: zenflow-web
