openapi: "3.0.3"
info:
  title: ZenFlow API
  version: "1.0.0"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Organization:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        plan_type:
          type: string
        credits_balance:
          type: integer
          format: int64
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
        name:
          type: string
    Workflow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        title:
          type: string
        trigger_event:
          type: string
        status:
          type: string
        version:
          type: integer
          format: int64
        root_workflow_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Action:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        action_type:
          type: string
        payload_template:
          type: string
        sequence_order:
          type: integer
          format: int64
    ExecutionLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        status:
          type: string
        credits_spent:
          type: integer
          format: int64
        report_key:
          type: string
        executed_at:
          type: string
          format: date-time
    Webhook:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        url:
          type: string
        event_type:
          type: string
        created_at:
          type: string
          format: date-time
    Template:
      type: object
      properties:
        id:
          type: integer
          format: int64
        source_workflow_id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        category:
          type: string
        clone_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        message:
          type: string

paths:
  /organizations:
    post:
      operationId: CreateOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, plan_type, credits_balance]
              properties:
                name:
                  type: string
                  maxLength: 255
                plan_type:
                  type: string
                  maxLength: 50
                credits_balance:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"

  /users/register:
    post:
      operationId: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, email, password, role, name]
              properties:
                org_id:
                  type: integer
                  format: int64
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  maxLength: 50
                name:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/login:
    post:
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows:
    get:
      operationId: ListWorkflows
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: CreateWorkflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, trigger_event]
              properties:
                title:
                  type: string
                  maxLength: 255
                trigger_event:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}:
    get:
      operationId: GetWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow details
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/activate:
    post:
      operationId: ActivateWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/pause:
    post:
      operationId: PauseWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/archive:
    post:
      operationId: ArchiveWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/execute:
    post:
      operationId: ExecuteWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  log:
                    $ref: "#/components/schemas/ExecutionLog"
                  credits_remaining:
                    type: integer
                    format: int64
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Workflow is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/execute-with-report:
    post:
      operationId: ExecuteWithReport
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow executed with report
          content:
            application/json:
              schema:
                type: object
                properties:
                  log:
                    $ref: "#/components/schemas/ExecutionLog"
                  credits_remaining:
                    type: integer
                    format: int64
                  report_key:
                    type: string
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Workflow is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /execution-logs/{id}/report:
    get:
      operationId: GetExecutionReport
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Execution report
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_key:
                    type: string
                  status:
                    type: string
                  credits_spent:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Execution log not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/actions:
    post:
      operationId: AddAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_type, payload_template, sequence_order]
              properties:
                action_type:
                  type: string
                  maxLength: 100
                payload_template:
                  type: string
                sequence_order:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Action added
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    $ref: "#/components/schemas/Action"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/new-version:
    post:
      operationId: CreateWorkflowVersion
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "201":
          description: New workflow version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/versions:
    get:
      operationId: ListWorkflowVersions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /templates:
    get:
      operationId: ListTemplates
      x-pagination:
        style: cursor
        defaultLimit: 20
        maxLimit: 100
      x-filter:
        allowed: [category]
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Template"
                  next_cursor:
                    type: string
                  has_next:
                    type: boolean
    post:
      operationId: PublishTemplate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_workflow_id, title, description, category]
              properties:
                source_workflow_id:
                  type: integer
                  format: int64
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                category:
                  type: string
                  maxLength: 100
      responses:
        "201":
          description: Template published
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: "#/components/schemas/Template"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Template already published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /templates/{id}:
    get:
      operationId: GetTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: "#/components/schemas/Template"
                  org_name:
                    type: string
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /templates/{id}/clone:
    post:
      operationId: CloneTemplate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "201":
          description: Template cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
                  template_id:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks:
    post:
      operationId: CreateWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, event_type]
              properties:
                url:
                  type: string
                  maxLength: 2048
                event_type:
                  type: string
                  maxLength: 100
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    $ref: "#/components/schemas/Webhook"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: ListWebhooks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/{id}:
    delete:
      operationId: DeleteWebhook
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/schedule:
    post:
      operationId: SetSchedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cron]
              properties:
                cron:
                  type: string
                  maxLength: 100
      responses:
        "200":
          description: Schedule set
          content:
            application/json:
              schema:
                type: object
                properties:
                  cron:
                    type: string
                  next_run:
                    type: string
        "400":
          description: Invalid cron expression
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: GetSchedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema:
                type: object
                properties:
                  cron:
                    type: string
                  next_run:
                    type: string
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: DeleteSchedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Schedule deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}/logs:
    get:
      operationId: ListExecutionLogs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Execution logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExecutionLog"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
