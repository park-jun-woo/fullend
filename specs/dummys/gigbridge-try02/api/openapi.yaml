openapi: 3.0.3
info:
  title: GigBridge API
  version: 1.0.0
  description: Freelance Escrow Matching Platform

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
        name:
          type: string

    Gig:
      type: object
      properties:
        id:
          type: integer
          format: int64
        client_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        budget:
          type: integer
          format: int64
        status:
          type: string
        freelancer_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    Proposal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        freelancer_id:
          type: integer
          format: int64
        bid_amount:
          type: integer
          format: int64
        status:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        tx_type:
          type: string
        amount:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, name]
              properties:
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /auth/login:
    post:
      operationId: Login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs:
    get:
      operationId: ListGigs
      summary: List all gigs
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [budget, created_at]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status, budget]
      x-include:
        allowed: [client_id:users.id]
      responses:
        '200':
          description: List of gigs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Gig'
                  total:
                    type: integer

    post:
      operationId: CreateGig
      summary: Create a new gig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, budget]
              properties:
                title:
                  type: string
                description:
                  type: string
                budget:
                  type: integer
                  format: int64
      responses:
        '200':
          description: Gig created
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'

  /gigs/{id}:
    get:
      operationId: GetGig
      summary: Get a single gig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gig detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs/{id}/publish:
    put:
      operationId: PublishGig
      summary: Publish a gig
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gig published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs/{id}/proposals:
    post:
      operationId: SubmitProposal
      summary: Submit a proposal for a gig
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bid_amount]
              properties:
                bid_amount:
                  type: integer
                  format: int64
      responses:
        '200':
          description: Proposal submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: '#/components/schemas/Proposal'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /proposals/{id}/accept:
    post:
      operationId: AcceptProposal
      summary: Accept a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Proposal accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: '#/components/schemas/Proposal'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /proposals/{id}/reject:
    post:
      operationId: RejectProposal
      summary: Reject a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Proposal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: '#/components/schemas/Proposal'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs/{id}/submit-work:
    post:
      operationId: SubmitWork
      summary: Submit completed work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs/{id}/approve:
    post:
      operationId: ApproveWork
      summary: Approve submitted work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Work approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gigs/{id}/dispute:
    post:
      operationId: RaiseDispute
      summary: Raise a dispute
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dispute raised
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: '#/components/schemas/Gig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
