apiVersion: fullend/v1
kind: Project
metadata:
  name: zenflow
backend:
  lang: go
  framework: gin
  module: github.com/example/zenflow
  middleware:
    - bearerAuth
  auth:
    type: jwt
    secret_env: JWT_SECRET
    claims:
      UserID: user_id
      Email: email
      Role: role
frontend:
  lang: typescript
  framework: react
  bundler: vite
  name: zenflow-web
