openapi: 3.0.3
info:
  title: ZenFlow API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /auth/register:
    post:
      operationId: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, org_id, role]
              properties:
                email:
                  type: string
                password:
                  type: string
                org_id:
                  type: integer
                  format: int64
                role:
                  type: string
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
  /auth/login:
    post:
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "404":
          description: User not found
  /workflows:
    post:
      operationId: CreateWorkflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, trigger_event]
              properties:
                title:
                  type: string
                trigger_event:
                  type: string
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
    get:
      operationId: ListWorkflows
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workflows list
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
  /workflows/{id}:
    get:
      operationId: GetWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "404":
          description: Workflow not found
  /workflows/{id}/actions:
    post:
      operationId: AddAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_type, sequence_order]
              properties:
                action_type:
                  type: string
                payload_template:
                  type: string
                sequence_order:
                  type: integer
      responses:
        "201":
          description: Action added
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    $ref: "#/components/schemas/Action"
        "403":
          description: Not authorized
        "404":
          description: Workflow not found
  /workflows/{id}/activate:
    post:
      operationId: ActivateWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "402":
          description: Insufficient credits
        "403":
          description: Not authorized
        "404":
          description: Workflow not found
        "409":
          description: Invalid state transition
  /workflows/{id}/pause:
    post:
      operationId: PauseWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
        "404":
          description: Workflow not found
        "409":
          description: Invalid state transition
  /workflows/{id}/archive:
    post:
      operationId: ArchiveWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: "#/components/schemas/Workflow"
        "403":
          description: Not authorized
        "404":
          description: Workflow not found
        "409":
          description: Invalid state transition
  /workflows/{id}/execute:
    post:
      operationId: ExecuteWorkflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Workflow executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution_log:
                    $ref: "#/components/schemas/ExecutionLog"
        "402":
          description: Insufficient credits
        "403":
          description: Not authorized
        "404":
          description: Workflow not found
        "409":
          description: Workflow not active
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
    Workflow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        title:
          type: string
        trigger_event:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    Action:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        action_type:
          type: string
        payload_template:
          type: string
        sequence_order:
          type: integer
    ExecutionLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        status:
          type: string
        credits_spent:
          type: integer
        executed_at:
          type: string
          format: date-time
