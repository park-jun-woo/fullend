<!DOCTYPE html>
<html lang="en">
<head><title>Workflows</title></head>
<body>
  <h1>Workflows</h1>
  <section data-fetch="ListWorkflows">
    <div data-state=".loading">Loading...</div>
    <div data-state=".error">Error loading workflows</div>
    <div data-state=".empty">No workflows found</div>
    <ul>
      <li data-each="workflows">
        <a data-bind="title"></a>
        <span data-bind="status"></span>
      </li>
    </ul>
  </section>
  <form data-action="CreateWorkflow">
    <input data-field="title" type="text" placeholder="Title" />
    <input data-field="trigger_event" type="text" placeholder="Trigger Event" />
    <button type="submit">Create Workflow</button>
  </form>
</body>
</html>
