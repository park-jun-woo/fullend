openapi: 3.0.3
info:
  title: ZenFlow API
  version: 1.0.0
  description: Multi-tenant workflow automation SaaS

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Organization:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        plan_type:
          type: string
        credits_balance:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string

    Workflow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        title:
          type: string
        trigger_event:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Action:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        action_type:
          type: string
        payload_template:
          type: object
        sequence_order:
          type: integer

    Execution:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        log_status:
          type: string
        credits_spent:
          type: integer
        executed_at:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, email, password, role]
              properties:
                org_id:
                  type: integer
                  format: int64
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          description: Email already exists

  /auth/login:
    post:
      operationId: Login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        '401':
          description: Invalid credentials

  /workflows:
    post:
      operationId: CreateWorkflow
      summary: Create a new workflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, trigger_event]
              properties:
                title:
                  type: string
                trigger_event:
                  type: string
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'
        '403':
          description: Forbidden
        '404':
          description: User not found

    get:
      operationId: ListWorkflows
      summary: List workflows for current org
      security:
        - bearerAuth: []
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status]
      responses:
        '200':
          description: Workflow list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workflow'
                  total:
                    type: integer
        '403':
          description: Forbidden
        '404':
          description: User not found

  /workflows/{id}:
    get:
      operationId: GetWorkflow
      summary: Get workflow details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'
        '403':
          description: Forbidden
        '404':
          description: Workflow not found

  /workflows/{id}/activate:
    post:
      operationId: ActivateWorkflow
      summary: Activate a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'
        '402':
          description: Insufficient credits
        '403':
          description: Forbidden
        '404':
          description: Workflow not found
        '409':
          description: Invalid state transition

  /workflows/{id}/pause:
    post:
      operationId: PauseWorkflow
      summary: Pause an active workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'
        '403':
          description: Forbidden
        '404':
          description: Workflow not found
        '409':
          description: Invalid state transition

  /workflows/{id}/archive:
    post:
      operationId: ArchiveWorkflow
      summary: Archive an active workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'
        '403':
          description: Forbidden
        '404':
          description: Workflow not found
        '409':
          description: Invalid state transition

  /workflows/{id}/execute:
    post:
      operationId: ExecuteWorkflow
      summary: Execute a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  log:
                    $ref: '#/components/schemas/Execution'
        '402':
          description: Insufficient credits
        '403':
          description: Forbidden
        '404':
          description: Workflow not found
        '409':
          description: Workflow not active

  /workflows/{id}/actions:
    post:
      operationId: AddAction
      summary: Add an action to a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_type, sequence_order]
              properties:
                action_type:
                  type: string
                payload_template:
                  type: object
                sequence_order:
                  type: integer
      responses:
        '201':
          description: Action added
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    $ref: '#/components/schemas/Action'
        '403':
          description: Forbidden
        '404':
          description: Workflow not found

    get:
      operationId: ListActions
      summary: List actions for a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Action list
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Action'
        '403':
          description: Forbidden
        '404':
          description: Workflow not found
