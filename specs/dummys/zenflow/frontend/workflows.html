<!DOCTYPE html>
<html lang="en">
<head><title>Workflows</title></head>
<body>
  <h1>Workflows</h1>

  <section data-fetch="ListWorkflows" data-paginate="offset" data-sort="created_at:desc" data-filter="status">
    <div data-each="items">
      <h3 data-bind="title"></h3>
      <span data-bind="status"></span>
      <span data-bind="trigger_event"></span>
    </div>
    <div data-state="items.empty">
      <p>No workflows found.</p>
    </div>
  </section>

  <form data-action="CreateWorkflow">
    <input data-field="title" type="text" placeholder="Workflow title" />
    <input data-field="trigger_event" type="text" placeholder="Trigger event" />
    <button type="submit">Create Workflow</button>
  </form>
</body>
</html>
