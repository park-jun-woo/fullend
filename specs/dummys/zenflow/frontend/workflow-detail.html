<!DOCTYPE html>
<html lang="en">
<head><title>Workflow Detail</title></head>
<body>
  <section data-fetch="GetWorkflow" data-param-id="route.id">
    <h1 data-bind="workflow.title"></h1>
    <p data-bind="workflow.status"></p>
    <p data-bind="workflow.trigger_event"></p>
  </section>

  <section data-fetch="ListActions" data-param-id="route.id">
    <h2>Actions</h2>
    <div data-each="actions">
      <span data-bind="action_type"></span>
      <span data-bind="sequence_order"></span>
    </div>
  </section>

  <form data-action="ActivateWorkflow" data-param-id="route.id">
    <button type="submit">Activate</button>
  </form>

  <form data-action="PauseWorkflow" data-param-id="route.id">
    <button type="submit">Pause</button>
  </form>

  <form data-action="ArchiveWorkflow" data-param-id="route.id">
    <button type="submit">Archive</button>
  </form>

  <form data-action="ExecuteWorkflow" data-param-id="route.id">
    <button type="submit">Execute</button>
  </form>

  <form data-action="AddAction" data-param-id="route.id">
    <input data-field="action_type" type="text" placeholder="Action type" />
    <input data-field="sequence_order" type="number" placeholder="Order" />
    <button type="submit">Add Action</button>
  </form>
</body>
</html>
