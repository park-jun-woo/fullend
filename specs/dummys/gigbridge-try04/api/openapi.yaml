openapi: "3.0.3"
info:
  title: GigBridge API
  version: "1.0.0"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
        name:
          type: string
    Gig:
      type: object
      properties:
        id:
          type: integer
          format: int64
        client_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        budget:
          type: integer
          format: int64
        status:
          type: string
        freelancer_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Proposal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        freelancer_id:
          type: integer
          format: int64
        bid_amount:
          type: integer
          format: int64
        status:
          type: string
    Error:
      type: object
      properties:
        message:
          type: string

paths:
  /users/register:
    post:
      operationId: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, name]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  maxLength: 50
                name:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"

  /users/login:
    post:
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs:
    get:
      operationId: ListGigs
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at, budget]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status]
      x-include:
        allowed: [client_id:users.id]
      responses:
        "200":
          description: List of gigs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Gig"
                  total:
                    type: integer
    post:
      operationId: CreateGig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, budget]
              properties:
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                budget:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Gig created
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}:
    get:
      operationId: GetGig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig details
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}/publish:
    put:
      operationId: PublishGig
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}/proposals:
    post:
      operationId: SubmitProposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bid_amount]
              properties:
                bid_amount:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Proposal submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: "#/components/schemas/Proposal"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}/submit-work:
    post:
      operationId: SubmitWork
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}/approve:
    post:
      operationId: ApproveWork
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
                  transaction_id:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gigs/{id}/dispute:
    post:
      operationId: RaiseDispute
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Dispute raised
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Gig not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /proposals/{id}/accept:
    post:
      operationId: AcceptProposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    $ref: "#/components/schemas/Gig"
                  transaction_id:
                    type: integer
                    format: int64
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proposal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /proposals/{id}/reject:
    post:
      operationId: RejectProposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    $ref: "#/components/schemas/Proposal"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proposal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
