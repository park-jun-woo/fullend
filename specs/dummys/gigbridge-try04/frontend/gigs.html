<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gigs</title>
</head>
<body>
    <section data-fetch="ListGigs" data-paginate data-sort="created_at:desc" data-filter="status">
        <ul data-each="items">
            <li>
                <h3 data-bind="title"></h3>
                <p data-bind="description"></p>
                <span data-bind="budget"></span>
                <span data-bind="status"></span>
            </li>
        </ul>
    </section>
</body>
</html>
