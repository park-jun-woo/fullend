openapi: "3.0.3"
info:
  title: GigBridge API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        password_hash:
          type: string
        role:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
    Gig:
      type: object
      properties:
        id:
          type: integer
          format: int64
        client_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        budget:
          type: integer
        status:
          type: string
        freelancer_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Proposal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        freelancer_id:
          type: integer
          format: int64
        bid_amount:
          type: integer
        status:
          type: string
        created_at:
          type: string
          format: date-time
    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        gig_id:
          type: integer
          format: int64
        tx_type:
          type: string
        amount:
          type: integer
        created_at:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, name]
              properties:
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      email:
                        type: string
                      role:
                        type: string
                      name:
                        type: string

  /auth/login:
    post:
      operationId: Login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /gigs:
    post:
      operationId: CreateGig
      summary: Create a new gig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, budget]
              properties:
                title:
                  type: string
                description:
                  type: string
                budget:
                  type: integer
      responses:
        "200":
          description: Gig created
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      client_id:
                        type: integer
                        format: int64
                      title:
                        type: string
                      description:
                        type: string
                      budget:
                        type: integer
                      status:
                        type: string
    get:
      operationId: ListGigs
      summary: List gigs
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [budget, created_at]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status, budget]
      x-include:
        allowed: [client_id:users.id]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of gigs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Gig"
                  total:
                    type: integer

  /gigs/{id}:
    get:
      operationId: GetGig
      summary: Get gig detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      title:
                        type: string
                      description:
                        type: string
                      budget:
                        type: integer
                      status:
                        type: string
                      freelancer_id:
                        type: integer
                        format: int64

  /gigs/{id}/publish:
    put:
      operationId: PublishGig
      summary: Publish a gig
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Gig published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string

  /gigs/{id}/proposals:
    post:
      operationId: SubmitProposal
      summary: Submit a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bid_amount]
              properties:
                bid_amount:
                  type: integer
      responses:
        "200":
          description: Proposal submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      gig_id:
                        type: integer
                        format: int64
                      freelancer_id:
                        type: integer
                        format: int64
                      bid_amount:
                        type: integer
                      status:
                        type: string

  /proposals/{id}/reject:
    post:
      operationId: RejectProposal
      summary: Reject a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string

  /proposals/{id}/accept:
    post:
      operationId: AcceptProposal
      summary: Accept a proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Proposal accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string
                      freelancer_id:
                        type: integer
                        format: int64

  /gigs/{id}/submit-work:
    post:
      operationId: SubmitWork
      summary: Submit work for review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string

  /gigs/{id}/dispute:
    post:
      operationId: RaiseDispute
      summary: Raise a dispute on submitted work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Dispute raised
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string

  /gigs/{id}/approve:
    post:
      operationId: ApproveWork
      summary: Approve submitted work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Work approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  gig:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      status:
                        type: string
