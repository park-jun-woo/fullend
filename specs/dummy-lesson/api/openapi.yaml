openapi: "3.0.3"
info:
  title: Online Lesson Platform API
  version: "1.0.0"

paths:
  /login:
    post:
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /register:
    post:
      operationId: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /courses:
    get:
      operationId: ListCourses
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at, price]
        default: created_at
        direction: desc
      x-filter:
        allowed: [category, level]
      x-include:
        allowed: [instructor_id:users.id]
      responses:
        "200":
          description: 강의 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCoursesResponse"
    post:
      operationId: CreateCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "200":
          description: 강의 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"

  /courses/{CourseID}:
    get:
      operationId: GetCourse
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      x-include:
        allowed: [instructor_id:users.id]
      responses:
        "200":
          description: 강의 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetailResponse"
    put:
      operationId: UpdateCourse
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: 강의 수정 성공
    delete:
      operationId: DeleteCourse
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 강의 삭제 성공

  /courses/{CourseID}/publish:
    put:
      operationId: PublishCourse
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 강의 공개 성공

  /courses/{CourseID}/lessons:
    get:
      operationId: ListLessons
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 차시 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLessonsResponse"
    post:
      operationId: CreateLesson
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "200":
          description: 차시 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonResponse"

  /lessons/{LessonID}:
    put:
      operationId: UpdateLesson
      security:
        - bearerAuth: []
      parameters:
        - name: LessonID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: 차시 수정 성공
    delete:
      operationId: DeleteLesson
      security:
        - bearerAuth: []
      parameters:
        - name: LessonID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 차시 삭제 성공

  /courses/{CourseID}/enroll:
    post:
      operationId: EnrollCourse
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollRequest"
      responses:
        "200":
          description: 수강 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollResponse"

  /me/enrollments:
    get:
      operationId: ListMyEnrollments
      security:
        - bearerAuth: []
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at]
        default: created_at
        direction: desc
      x-include:
        allowed: [course_id:courses.id]
      responses:
        "200":
          description: 내 수강 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnrollmentsResponse"

  /courses/{CourseID}/reviews:
    get:
      operationId: ListReviews
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      x-pagination:
        style: offset
        defaultLimit: 10
        maxLimit: 50
      x-sort:
        allowed: [created_at, rating]
        default: created_at
        direction: desc
      responses:
        "200":
          description: 리뷰 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReviewsResponse"
    post:
      operationId: CreateReview
      security:
        - bearerAuth: []
      parameters:
        - name: CourseID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "200":
          description: 리뷰 작성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"

  /reviews/{ReviewID}:
    delete:
      operationId: DeleteReview
      security:
        - bearerAuth: []
      parameters:
        - name: ReviewID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 리뷰 삭제 성공

  /me/payments:
    get:
      operationId: ListMyPayments
      security:
        - bearerAuth: []
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [created_at]
        default: created_at
        direction: desc
      x-filter:
        allowed: [status, payment_method]
      responses:
        "200":
          description: 결제 내역
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPaymentsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    LoginRequest:
      type: object
      required: [Email, Password]
      properties:
        Email:
          type: string
          format: email
        Password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          $ref: "#/components/schemas/Token"

    Token:
      type: object
      properties:
        AccessToken:
          type: string
        ExpiresAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [Email, Password, Name]
      properties:
        Email:
          type: string
          format: email
        Password:
          type: string
        Name:
          type: string

    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        Email:
          type: string
        Name:
          type: string
        Role:
          type: string

    CreateCourseRequest:
      type: object
      required: [Title, Category, Level, Price]
      properties:
        Title:
          type: string
        Description:
          type: string
        Category:
          type: string
        Level:
          type: string
        Price:
          type: integer

    UpdateCourseRequest:
      type: object
      required: [Title, Category, Level, Price]
      properties:
        Title:
          type: string
        Description:
          type: string
        Category:
          type: string
        Level:
          type: string
        Price:
          type: integer

    CourseResponse:
      type: object
      properties:
        course:
          $ref: "#/components/schemas/Course"

    CourseDetailResponse:
      type: object
      properties:
        course:
          $ref: "#/components/schemas/Course"
        instructor:
          $ref: "#/components/schemas/User"
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"

    ListCoursesResponse:
      type: object
      properties:
        courses:
          type: array
          items:
            $ref: "#/components/schemas/Course"
        total:
          type: integer

    Course:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        InstructorID:
          type: integer
          format: int64
        Title:
          type: string
        Description:
          type: string
        Category:
          type: string
        Level:
          type: string
        Price:
          type: integer
        Published:
          type: boolean
        CreatedAt:
          type: string
          format: date-time

    CreateLessonRequest:
      type: object
      required: [Title]
      properties:
        Title:
          type: string
        VideoURL:
          type: string
        SortOrder:
          type: integer

    UpdateLessonRequest:
      type: object
      required: [Title]
      properties:
        Title:
          type: string
        VideoURL:
          type: string
        SortOrder:
          type: integer

    LessonResponse:
      type: object
      properties:
        lesson:
          $ref: "#/components/schemas/Lesson"

    ListLessonsResponse:
      type: object
      properties:
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"

    Lesson:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        CourseID:
          type: integer
          format: int64
        Title:
          type: string
        VideoURL:
          type: string
        SortOrder:
          type: integer

    EnrollRequest:
      type: object
      required: [PaymentMethod]
      properties:
        PaymentMethod:
          type: string

    EnrollResponse:
      type: object
      properties:
        enrollment:
          $ref: "#/components/schemas/Enrollment"
        payment:
          $ref: "#/components/schemas/Payment"

    ListEnrollmentsResponse:
      type: object
      properties:
        enrollments:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
        total:
          type: integer

    Enrollment:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        UserID:
          type: integer
          format: int64
        CourseID:
          type: integer
          format: int64
        CreatedAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required: [Rating, Comment]
      properties:
        Rating:
          type: integer
        Comment:
          type: string

    ReviewResponse:
      type: object
      properties:
        review:
          $ref: "#/components/schemas/Review"

    ListReviewsResponse:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer

    Review:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        UserID:
          type: integer
          format: int64
        CourseID:
          type: integer
          format: int64
        Rating:
          type: integer
        Comment:
          type: string
        CreatedAt:
          type: string
          format: date-time

    ListPaymentsResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          type: integer

    Payment:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        UserID:
          type: integer
          format: int64
        EnrollmentID:
          type: integer
          format: int64
        Amount:
          type: integer
        PaymentMethod:
          type: string
        Status:
          type: string
        CreatedAt:
          type: string
          format: date-time
