<main class="max-w-md mx-auto mt-16">
  <h1 class="text-2xl font-bold mb-6">회원가입</h1>
  <form data-action="Register" class="space-y-4">
    <input data-field="Email" type="email" placeholder="이메일" class="w-full border p-2 rounded" />
    <input data-field="Password" type="password" placeholder="비밀번호" class="w-full border p-2 rounded" />
    <input data-field="Name" type="text" placeholder="이름" class="w-full border p-2 rounded" />
    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded">가입하기</button>
  </form>
</main>
