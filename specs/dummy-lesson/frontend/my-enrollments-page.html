<main class="max-w-4xl mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">내 수강 목록</h1>

  <section data-fetch="ListMyEnrollments" data-paginate data-sort="created_at:desc" data-include="course" class="space-y-4">
    <div data-state="enrollments.loading" class="text-gray-500">로딩 중...</div>
    <p data-state="enrollments.empty" class="text-gray-400">수강 중인 강의가 없습니다</p>

    <ul data-each="enrollments" class="space-y-3">
      <li class="border rounded p-4">
        <h3 data-bind="CourseID" class="font-semibold"></h3>
        <p data-bind="CreatedAt" class="text-sm text-gray-500"></p>
      </li>
    </ul>
  </section>
</main>
