<main class="max-w-4xl mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">결제 내역</h1>

  <section data-fetch="ListMyPayments" data-paginate data-sort="created_at:desc" data-filter="status,method" class="space-y-4">
    <div data-state="payments.loading" class="text-gray-500">로딩 중...</div>
    <p data-state="payments.empty" class="text-gray-400">결제 내역이 없습니다</p>

    <ul data-each="payments" class="space-y-3">
      <li class="border rounded p-4 flex justify-between">
        <div>
          <p data-bind="Amount" class="font-bold text-lg"></p>
          <p data-bind="Method" class="text-sm text-gray-500"></p>
        </div>
        <div class="text-right">
          <span data-bind="Status" class="text-sm px-2 py-1 rounded bg-gray-100"></span>
          <p data-bind="CreatedAt" class="text-xs text-gray-400 mt-1"></p>
        </div>
      </li>
    </ul>
  </section>
</main>
