<main class="max-w-4xl mx-auto mt-8">
  <section data-fetch="GetCourse" data-param-CourseID="route.CourseID" data-include="user,lesson" class="space-y-6">
    <header>
      <h1 data-bind="course.Title" class="text-3xl font-bold"></h1>
      <p data-bind="course.Description" class="text-gray-600 mt-2"></p>
      <dl class="flex gap-4 mt-4 text-sm">
        <div>
          <dt class="text-gray-400">강사</dt>
          <dd data-bind="instructor.Name" class="font-medium"></dd>
        </div>
        <div>
          <dt class="text-gray-400">카테고리</dt>
          <dd data-bind="course.Category"></dd>
        </div>
        <div>
          <dt class="text-gray-400">레벨</dt>
          <dd data-bind="course.Level"></dd>
        </div>
        <div>
          <dt class="text-gray-400">가격</dt>
          <dd data-bind="course.Price" class="font-bold"></dd>
        </div>
      </dl>
    </header>

    <section>
      <h2 class="text-xl font-semibold mb-3">차시 목록</h2>
      <p data-state="lessons.empty" class="text-gray-400">아직 차시가 없습니다</p>
      <ul data-each="lessons" class="space-y-2">
        <li class="border rounded p-3 flex justify-between">
          <span data-bind="Title"></span>
          <div data-component="VideoPlayer" data-bind="VideoURL"></div>
        </li>
      </ul>
    </section>
  </section>

  <section class="mt-8">
    <h2 class="text-xl font-semibold mb-3">수강 신청</h2>
    <form data-action="EnrollCourse" data-param-CourseID="route.CourseID" class="flex gap-2">
      <select data-field="PaymentMethod" class="border p-2 rounded">
        <option value="card">카드</option>
        <option value="transfer">계좌이체</option>
      </select>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">수강 신청</button>
    </form>
  </section>

  <section class="mt-8">
    <h2 class="text-xl font-semibold mb-3">리뷰</h2>

    <section data-fetch="ListReviews" data-param-CourseID="route.CourseID" data-paginate data-sort="created_at:desc" class="space-y-3">
      <p data-state="reviews.empty" class="text-gray-400">아직 리뷰가 없습니다</p>
      <ul data-each="reviews" class="space-y-2">
        <li class="border rounded p-3">
          <div data-component="RatingStars" data-bind="Rating"></div>
          <p data-bind="Comment" class="mt-1"></p>
        </li>
      </ul>
    </section>

    <form data-action="CreateReview" data-param-CourseID="route.CourseID" class="mt-4 space-y-2">
      <select data-field="Rating" class="border p-2 rounded">
        <option value="5">★★★★★</option>
        <option value="4">★★★★☆</option>
        <option value="3">★★★☆☆</option>
        <option value="2">★★☆☆☆</option>
        <option value="1">★☆☆☆☆</option>
      </select>
      <textarea data-field="Comment" placeholder="리뷰를 작성하세요" class="w-full border p-2 rounded"></textarea>
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">리뷰 작성</button>
    </form>
  </section>
</main>
