<main class="max-w-2xl mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">강의 수정</h1>

  <section data-fetch="GetCourse" data-param-CourseID="route.CourseID">
    <form data-action="UpdateCourse" data-param-CourseID="route.CourseID" class="space-y-4">
      <input data-field="Title" type="text" placeholder="강의 제목" class="w-full border p-2 rounded" />
      <textarea data-field="Description" placeholder="강의 설명" class="w-full border p-2 rounded"></textarea>
      <select data-field="Category" class="border p-2 rounded">
        <option value="dev">개발</option>
        <option value="design">디자인</option>
        <option value="business">비즈니스</option>
      </select>
      <select data-field="Level" class="border p-2 rounded">
        <option value="beginner">초급</option>
        <option value="intermediate">중급</option>
        <option value="advanced">고급</option>
      </select>
      <input data-field="Price" type="number" placeholder="가격" class="w-full border p-2 rounded" />
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">수정</button>
    </form>
  </section>

  <section class="mt-8">
    <h2 class="text-xl font-semibold mb-3">차시 관리</h2>

    <section data-fetch="ListLessons" data-param-CourseID="route.CourseID">
      <ul data-each="lessons" class="space-y-2">
        <li class="border rounded p-3 flex justify-between items-center">
          <span data-bind="Title"></span>
          <span data-bind="SortOrder" class="text-sm text-gray-400"></span>
        </li>
      </ul>
    </section>

    <form data-action="CreateLesson" data-param-CourseID="route.CourseID" class="mt-4 space-y-2">
      <input data-field="Title" type="text" placeholder="차시 제목" class="w-full border p-2 rounded" />
      <input data-field="VideoURL" type="url" placeholder="영상 URL" class="w-full border p-2 rounded" />
      <input data-field="SortOrder" type="number" placeholder="순서" class="w-full border p-2 rounded" />
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">차시 추가</button>
    </form>
  </section>
</main>
