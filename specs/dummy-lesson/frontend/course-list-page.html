<main class="max-w-4xl mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">강의 목록</h1>

  <section data-fetch="ListCourses" data-paginate data-sort="created_at:desc" data-filter="category,level" data-include="user" class="space-y-4">
    <div data-state="courses.loading" class="text-gray-500">로딩 중...</div>
    <div data-state="courses.error" class="text-red-500">강의를 불러오지 못했습니다</div>
    <p data-state="courses.empty" class="text-gray-400">등록된 강의가 없습니다</p>

    <ul data-each="courses" class="grid grid-cols-2 gap-4">
      <li class="border rounded p-4">
        <h3 data-bind="Title" class="font-semibold text-lg"></h3>
        <p data-bind="Description" class="text-gray-600 text-sm mt-1"></p>
        <span data-bind="Category" class="text-xs bg-gray-100 px-2 py-1 rounded"></span>
        <span data-bind="Level" class="text-xs bg-blue-100 px-2 py-1 rounded ml-1"></span>
        <p data-bind="Price" class="font-bold mt-2"></p>
      </li>
    </ul>
  </section>
</main>
