apiVersion: fullend/v1
kind: Project
metadata:
  name: gigbridge
backend:
  lang: go
  framework: gin
  module: github.com/example/gigbridge
  middleware:
    - bearerAuth
  db:
    auto_nobody_seed: true
  auth:
    type: jwt
    secret_env: JWT_SECRET
    claims:
      ID: user_id:int64
      Email: email
      Role: role
    roles:
      - client
      - freelancer
      - admin
frontend:
  lang: typescript
  framework: react
  bundler: vite
  name: gigbridge-web
